name: tarang
description: Tarang - A modern music streaming app built with Flutter!

homepage: https://github.com/gokadzev/Tarang
repository: https://github.com/gokadzev/Tarang
issue_tracker: https://github.com/gokadzev/Tarang/issues

publish_to: 'none'
version: 10.1.0+175

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: ^3.44.5

dependencies:
  app_links: ^7.2.1
  audio_service: ^0.18.19
  audio_session: ^0.2.4
  cached_network_image: ^3.4.1
  dynamic_color: ^1.8.1
  file_picker: ^11.0.2
  fluentui_system_icons: ^1.1.273
  flutter:
    sdk: flutter
  flutter_flip_card: ^0.0.6
  flutter_localizations:
    sdk: flutter
  go_router: ^17.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  html: ^0.15.6
  http: ^1.6.0
  intl: ^0.20.2
  just_audio: ^0.10.6
  path_provider: ^2.1.6
  receive_sharing_intent:
    path: ./packages/receive_sharing_intent
  rxdart: ^0.28.0
  share_plus: ^12.0.2
  url_launcher: ^6.3.2
  youtube_explode_dart:
    path: ./packages/youtube_explode_dart
  youtube_music_explode_dart:
    path: ./packages/youtube_music_explode_dart

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/licenses/
    - assets/icons/icon.png

  fonts:
    - family: paytoneOne
      fonts:
        - asset: assets/fonts/paytone/PaytoneOne-Regular.ttf


flutter_launcher_icons:
  flutter_launcher_icons:
  android: true
  ios: false
  remove_alpha_ios: true
  image_path: "assets/icons/icon.png"
